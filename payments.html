<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiements - ELECTRON</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; margin: 0; }</style>
</head>
<body class="text-white">
  <nav class="p-4 border-b border-slate-800 flex justify-between">
    <a href="/" class="text-2xl font-bold text-cyan-400">⚡ ELECTRON</a>
    <a href="/cart" class="px-4 py-2 bg-cyan-500 rounded-lg">🛒 Panier</a>
  </nav>
  <div class="container mx-auto px-4 py-12">
    <h1 class="text-4xl font-bold text-center mb-8">💳 Moyens de Paiement</h1>
    <div class="grid grid-cols-2 md:grid-cols-3 gap-4 max-w-2xl mx-auto">
      <div class="card p-6 rounded-xl text-center"><span class="text-3xl">🟠</span><p class="mt-2">Orange Money</p></div>
      <div class="card p-6 rounded-xl text-center"><span class="text-3xl">🟡</span><p class="mt-2">MTN</p></div>
      <div class="card p-6 rounded-xl text-center"><span class="text-3xl">🔵</span><p class="mt-2">Wave</p></div>
      <div class="card p-6 rounded-xl text-center"><span class="text-3xl">💳</span><p class="mt-2">Stripe</p></div>
      <div class="card p-6 rounded-xl text-center"><span class="text-3xl">🔴</span><p class="mt-2">PayPal</p></div>
      <div class="card p-6 rounded-xl text-center"><span class="text-3xl">₿</span><p class="mt-2">Bitcoin</p></div>
    </div>
  </div>
</body>
</html>
