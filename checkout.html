<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - ELECTRON</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; margin: 0; }
  </style>
</head>
<body class="text-white">
  <div class="container mx-auto px-4 py-12 max-w-2xl">
    <h1 class="text-3xl font-bold mb-8">Commander</h1>
    <form class="space-y-4">
      <input type="text" placeholder="Nom complet" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white">
      <input type="email" placeholder="Email" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white">
      <input type="tel" placeholder="Telephone" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white">
      <textarea placeholder="Adresse" rows="3" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white"></textarea>
      <button class="w-full py-3 bg-cyan-500 rounded-lg font-semibold">Confirmer - 0 XOF</button>
    </form>
  </div>
</body>
</html>
