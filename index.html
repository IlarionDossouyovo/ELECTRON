<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELECTRON Business Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
    }
    .hero-title {
      background: linear-gradient(90deg, #22d3ee, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 2s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 10px #22d3ee); }
      to { filter: drop-shadow(0 0 20px #a78bfa); }
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body class="text-white">
  <div class="container mx-auto px-4 py-16">
    <!-- Header -->
    <header class="text-center mb-16">
      <h1 class="hero-title text-6xl font-bold mb-4">⚡ ELECTRON</h1>
      <p class="text-xl text-gray-400">Business Suite - Plateforme Digitale Complete</p>
    </header>
    
    <!-- Quick Links -->
    <div class="grid md:grid-cols-3 gap-6 max-w-4xl mx-auto mb-16">
      <a href="/e-expresse" class="card p-6 rounded-xl hover:bg-white/10 transition">
        <h3 class="text-xl font-bold text-cyan-400 mb-2">E-Expresse</h3>
        <p class="text-gray-400">Marketplace & E-commerce</p>
      </a>
      <a href="/ai-automation" class="card p-6 rounded-xl hover:bg-white/10 transition">
        <h3 class="text-xl font-bold text-purple-400 mb-2">AI Automation</h3>
        <p class="text-gray-400">Intelligence Artificielle</p>
      </a>
      <a href="/e-battisseurs" class="card p-6 rounded-xl hover:bg-white/10 transition">
        <h3 class="text-xl font-bold text-pink-400 mb-2">E-Battisseurs</h3>
        <p class="text-gray-400">Construction & BTP</p>
      </a>
    </div>
    
    <!-- Modules -->
    <div class="text-center">
      <h2 class="text-2xl font-bold mb-8">ModulesIntegres</h2>
      <div class="flex flex-wrap justify-center gap-4">
        <span class="px-4 py-2 bg-cyan-500/20 rounded-full text-cyan-300">E-commerce</span>
        <span class="px-4 py-2 bg-purple-500/20 rounded-full text-purple-300">Logistique</span>
        <span class="px-4 py-2 bg-pink-500/20 rounded-full text-pink-300">Paiements</span>
        <span class="px-4 py-2 bg-green-500/20 rounded-full text-green-300">IA</span>
        <span class="px-4 py-2 bg-blue-500/20 rounded-full text-blue-300">Marketing</span>
        <span class="px-4 py-2 bg-yellow-500/20 rounded-full text-yellow-300">Recrutement</span>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
