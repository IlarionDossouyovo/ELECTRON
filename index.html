<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ELECTRON Business Suite" />
    <title>ELECTRON Business Suite</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
        min-height: 100vh;
        font-family: system-ui, sans-serif;
      }
      #root {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .loading {
        color: #22d3ee;
        font-size: 1.5rem;
        text-align: center;
        padding: 2rem;
      }
      .loading::after {
        content: '.';
        animation: dots 1s infinite;
      }
      @keyframes dots {
        0%, 20% { content: '.'; }
        40% { content: '..'; }
        60%, 100% { content: '...'; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">Chargement ELECTRON</div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
