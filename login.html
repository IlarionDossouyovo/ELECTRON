<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - ELECTRON</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; margin: 0; }
  </style>
</head>
<body class="text-white">
  <div class="container mx-auto px-4 py-12 max-w-md">
    <h1 class="text-3xl font-bold text-center mb-8">⚡ ELECTRON</h1>
    <form class="space-y-4">
      <input type="email" placeholder="Email" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white">
      <input type="password" placeholder="Mot de passe" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white">
      <button class="w-full py-3 bg-cyan-500 rounded-lg font-semibold">Se connecter</button>
    </form>
    <p class="text-center mt-6 text-gray-400">Pas de compte? <a href="/register" class="text-cyan-400">S'inscrire</a></p>
  </div>
</body>
</html>
